<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusSphere Backend Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(0);
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        pre {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            margin-top: 10px;
            font-size: 12px;
        }
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-online { background: #28a745; }
        .status-offline { background: #dc3545; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 CampusSphere Backend Test</h1>
        <p class="subtitle">Test your backend deployment on Render</p>

        <div class="input-group">
            <label for="backendUrl">Backend URL (from Render)</label>
            <input 
                type="text" 
                id="backendUrl" 
                placeholder="https://your-app.onrender.com"
                value=""
            >
        </div>

        <button onclick="testHealth()">1️⃣ Test Health Endpoint</button>
        <button onclick="testRegistration()">2️⃣ Test Student Registration</button>
        <button onclick="testLogin()">3️⃣ Test Login</button>

        <div id="result" class="result"></div>
    </div>

    <script>
        function getBackendUrl() {
            const url = document.getElementById('backendUrl').value.trim();
            if (!url) {
                showResult('error', 'Please enter your backend URL from Render');
                return null;
            }
            return url.endsWith('/') ? url.slice(0, -1) : url;
        }

        function showResult(type, message, data = null) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = `result ${type}`;
            resultDiv.style.display = 'block';
            
            let html = message;
            if (data) {
                html += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            }
            resultDiv.innerHTML = html;
        }

        async function testHealth() {
            const backendUrl = getBackendUrl();
            if (!backendUrl) return;

            showResult('info', '⏳ Testing health endpoint...');

            try {
                const response = await fetch(`${backendUrl}/api/health`, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });

                const data = await response.json();

                if (response.ok && data.status === 'OK') {
                    showResult('success', 
                        `<span class="status-indicator status-online"></span>✅ Backend is ONLINE and working!`, 
                        data
                    );
                } else {
                    showResult('error', '❌ Backend responded but with unexpected data', data);
                }
            } catch (error) {
                showResult('error', 
                    `<span class="status-indicator status-offline"></span>❌ Backend is NOT accessible!<br><br>` +
                    `<strong>Error:</strong> ${error.message}<br><br>` +
                    `<strong>Possible causes:</strong><br>` +
                    `• Backend is not deployed yet<br>` +
                    `• Backend URL is incorrect<br>` +
                    `• Backend crashed (check Render logs)<br>` +
                    `• CORS issue (check CLIENT_URL in Render)`
                );
            }
        }

        async function testRegistration() {
            const backendUrl = getBackendUrl();
            if (!backendUrl) return;

            showResult('info', '⏳ Testing student registration...');

            const testUser = {
                name: 'Test Student',
                email: `test${Date.now()}@student.com`,
                phone: '1234567890',
                password: 'test123',
                confirmPassword: 'test123',
                role: 'student'
            };

            try {
                const response = await fetch(`${backendUrl}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(testUser)
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showResult('success', 
                        '✅ Registration works! Student account created successfully.', 
                        { 
                            message: data.message,
                            user: data.user,
                            token: data.token ? 'Token generated ✓' : 'No token'
                        }
                    );
                } else {
                    showResult('error', 
                        `❌ Registration failed: ${data.message || 'Unknown error'}`, 
                        data
                    );
                }
            } catch (error) {
                showResult('error', 
                    `❌ Registration request failed!<br><br>` +
                    `<strong>Error:</strong> ${error.message}<br><br>` +
                    `Make sure backend is running (test health endpoint first)`
                );
            }
        }

        async function testLogin() {
            const backendUrl = getBackendUrl();
            if (!backendUrl) return;

            showResult('info', '⏳ Testing login with seeded data...');

            const credentials = {
                email: 'alice.smith@campussphere.edu',
                password: 'student123',
                role: 'student'
            };

            try {
                const response = await fetch(`${backendUrl}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(credentials)
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showResult('success', 
                        '✅ Login works! Successfully authenticated.', 
                        { 
                            user: data.user,
                            token: data.token ? 'Token generated ✓' : 'No token'
                        }
                    );
                } else {
                    showResult('error', 
                        `❌ Login failed: ${data.message || 'Unknown error'}<br><br>` +
                        `<strong>Note:</strong> This test uses seeded data. Run "npm run seed" in Render Shell first.`, 
                        data
                    );
                }
            } catch (error) {
                showResult('error', 
                    `❌ Login request failed!<br><br>` +
                    `<strong>Error:</strong> ${error.message}<br><br>` +
                    `Make sure backend is running (test health endpoint first)`
                );
            }
        }

        // Auto-detect backend URL from localStorage if available
        window.onload = function() {
            const savedUrl = localStorage.getItem('campussphere_backend_url');
            if (savedUrl) {
                document.getElementById('backendUrl').value = savedUrl;
            }
            
            document.getElementById('backendUrl').addEventListener('change', function() {
                localStorage.setItem('campussphere_backend_url', this.value);
            });
        };
    </script>
</body>
</html>
